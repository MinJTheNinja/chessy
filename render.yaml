services:
  - type: web
    name: live-chess-global-matching
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: UPSTASH_REDIS_REST_URL
        sync: false
      - key: UPSTASH_REDIS_REST_TOKEN
        sync: false
      - key: MYMEMORY_EMAIL
        sync: false
      - key: MYMEMORY_ENDPOINT
        value: https://api.mymemory.translated.net
